name: Build NetScan

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish Windows
        run: |
          dotnet publish NetScan.Windows/NetScan.Windows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScan-windows
          path: publish/windows/NetScan.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish Linux
        run: |
          dotnet publish NetScan.CrossPlatform/NetScan.CrossPlatform.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/linux

      - name: Install appimagetool
        run: |
          sudo apt-get install -y libfuse2 imagemagick
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp publish/linux/NetScan AppDir/usr/bin/NetScan
          chmod +x AppDir/usr/bin/NetScan

          cat > AppDir/NetScan.desktop << 'EOF'
          [Desktop Entry]
          Name=NetScan
          Exec=NetScan
          Icon=NetScan
          Type=Application
          Categories=Network;
          EOF

          convert app.ico -resize 256x256 AppDir/NetScan.png

          ln -s usr/bin/NetScan AppDir/AppRun

      - name: Build AppImage
        run: ./appimagetool-x86_64.AppImage AppDir NetScan-x86_64.AppImage
        env:
          ARCH: x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScan-linux
          path: NetScan-x86_64.AppImage

  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish macOS
        run: |
          dotnet publish NetScan.CrossPlatform/NetScan.CrossPlatform.csproj \
            -c Release \
            -r osx-${{ matrix.arch }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/mac-${{ matrix.arch }}

      - name: Create .app bundle
        run: |
          APP="NetScan-${{ matrix.arch }}.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp "publish/mac-${{ matrix.arch }}/NetScan" "$APP/Contents/MacOS/NetScan"
          chmod +x "$APP/Contents/MacOS/NetScan"

          sips -s format png app.ico --out "$APP/Contents/Resources/NetScan.png" 2>/dev/null || true

          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NetScan</string>
            <key>CFBundleDisplayName</key>
            <string>NetScan</string>
            <key>CFBundleIdentifier</key>
            <string>dk.itagil.netscan</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleExecutable</key>
            <string>NetScan</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>NetScan</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          zip -r "NetScan-${{ matrix.arch }}.app.zip" "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScan-mac-${{ matrix.arch }}
          path: NetScan-${{ matrix.arch }}.app.zip

  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            NetScan-windows/NetScan.exe
            NetScan-linux/NetScan-x86_64.AppImage
            NetScan-mac-x64/NetScan-x64.app.zip
            NetScan-mac-arm64/NetScan-arm64.app.zip
